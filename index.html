<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LawnAdmin | Marketplace Control Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
      /* Initial Loading Screen Styles */
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #f4f7f6;
        font-family: 'Inter', sans-serif;
      }

      #app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        background: #2c3e50; /* Matches your Navy theme */
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-left-color: #2ecc71; /* Matches your Green theme */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loader-text {
        margin-top: 15px;
        color: white;
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 1px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Hide loader when app is mounted */
      .loaded #app-loader {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="spinner"></div>
      <div class="loader-text">INITIALIZING LAWNADMIN...</div>
    </div>

    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>

    <script>
      // Simple helper to remove loader once the window is ready
      // Vue will eventually take over, but this ensures a smooth transition
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.body.classList.add('loaded');
        }, 500);
      });
    </script>
  </body>
</html>
